name: RULYX
options:
  bundleIdPrefix: com.ajung
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: RULYX
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  RULYX:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets/Assets.xcassets
      - Sources/App/PrivacyInfo.xcprivacy
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: RULYX
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSFaceIDUsageDescription: "Rulyx uses Face ID to protect your accounts and moderation data."
        PushNotificationsEnabled: true
        BskyPushServiceDID: did:web:api.bsky.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.RULYX
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - RULYXTests
        - RULYXUITests
      gatherCoverageData: YES
  RULYXTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: RULYX
    settings:
      base:
        PRODUCT_NAME: RULYXTests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.RULYXTests
        GENERATE_INFOPLIST_FILE: YES
  RULYXUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: RULYX
    settings:
      base:
        PRODUCT_NAME: RULYXUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.RULYXUITests
        GENERATE_INFOPLIST_FILE: YES
