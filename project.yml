name: RULYX
options:
  bundleIdPrefix: com.ajung
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: RULYX
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "4PC9Z56E47"
targets:
  RULYX:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets/Assets.xcassets
      - Sources/App/PrivacyInfo.xcprivacy
    resources:
      - Sources/Domain/AI/model_manifest.json
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: RULYX
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        NSFaceIDUsageDescription: "Rulyx uses Face ID to protect your accounts and moderation data."
        PushNotificationsEnabled: true
        BskyPushServiceDID: did:web:api.bsky.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.RULYX
        MARKETING_VERSION: "1.0.6"
        CURRENT_PROJECT_VERSION: "60"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        APS_ENVIRONMENT: production
      configs:
        Debug:
          APS_ENVIRONMENT: development
    scheme:
      testTargets:
        - RULYXTests
        - RULYXUITests
      gatherCoverageData: YES
  RULYXTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: RULYX
    settings:
      base:
        PRODUCT_NAME: RULYXTests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.RULYXTests
        GENERATE_INFOPLIST_FILE: YES
  RULYXUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: RULYX
    settings:
      base:
        PRODUCT_NAME: RULYXUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.ajung.RULYXUITests
        GENERATE_INFOPLIST_FILE: YES
